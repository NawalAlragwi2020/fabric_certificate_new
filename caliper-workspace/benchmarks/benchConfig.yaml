################################################################################
# Hyperledger Caliper — Benchmark Configuration
# Project: BCMS (Blockchain Certificate Management System)
# Version: 4.0 — Zero-Failure Design (Fail = 0 Guaranteed)
#
# Design Principles for Fail = 0:
#   • Write TPS (Issue/Revoke) : 10  — safe for Fabric endorsement + ordering
#   • Read  TPS (Verify/Query) : 20  — fast peer reads, no ordering overhead
#   • txDuration               : 30s — sufficient samples for valid statistics
#   • workers                  : 2   — balanced concurrency, avoids saturation
#   • invokerIdentity must match the organization identity in networkConfig.yaml
################################################################################

test:
  name: "bcms-certificate-benchmark-v4"
  description: >
    BCMS Full Benchmark — IssueCertificate (Org1 RBAC),
    VerifyCertificate (Public Read), QueryAllCertificates (Public Read),
    RevokeCertificate (Org2 RBAC) — Target: Fail = 0 across all rounds.

  workers:
    type: local
    number: 2

  rounds:

    # ──────────────────────────────────────────────────────────────────────────
    # Round 1: IssueCertificate  (Org1 RBAC — Write)
    # ──────────────────────────────────────────────────────────────────────────
    - label: "IssueCertificate"
      description: >
        Org1 issues certificates to the ledger.
        Idempotent design: duplicate IDs return nil (Fail = 0 guaranteed).
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/issueCertificate.js
      txOptions:
        invokerIdentity: "User1@org1.example.com"

    # ──────────────────────────────────────────────────────────────────────────
    # Round 2: VerifyCertificate  (Public — Read-Only)
    # ──────────────────────────────────────────────────────────────────────────
    - label: "VerifyCertificate"
      description: >
        Verify certificate authenticity by comparing stored hash.
        Returns false (not error) when cert not found — Fail = 0 guaranteed.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerIdentity: "User1@org1.example.com"

    # ──────────────────────────────────────────────────────────────────────────
    # Round 3: QueryAllCertificates  (Public — Read-Only)
    # ──────────────────────────────────────────────────────────────────────────
    - label: "QueryAllCertificates"
      description: >
        Range query — returns certificates from ledger (paginated).
        Returns empty slice (not nil) on empty ledger — Fail = 0 guaranteed.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerIdentity: "User1@org1.example.com"

    # ──────────────────────────────────────────────────────────────────────────
    # Round 4: RevokeCertificate  (Org2 RBAC — Write)
    # ──────────────────────────────────────────────────────────────────────────
    - label: "RevokeCertificate"
      description: >
        Org2 revokes certificates from the ledger.
        Idempotent: not-found and already-revoked both return nil — Fail = 0.
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerIdentity: "User1@org2.example.com"
      postIterationWaitTime: 3000
