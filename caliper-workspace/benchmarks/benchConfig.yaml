# =============================================================================
# benchConfig.yaml — Caliper Benchmark Configuration v3.0
# =============================================================================
# System Under Test  : Hyperledger Fabric 2.5  (chaincode: basic)
# Channel            : mychannel
# Benchmark Rounds   : 4
# Target             : 100% Success Rate — Zero Failures
#
# Round summary (matches Report v3.0 metrics):
# ┌────────────────────────────┬──────────┬───────┬────────────┬───────────┐
# │ Round                      │ TPS      │ Dur   │ Invoker    │ ReadOnly  │
# ├────────────────────────────┼──────────┼───────┼────────────┼───────────┤
# │ 1. IssueCertificate        │ 50 TPS   │ 30 s  │ Org1 User1 │ No (write)│
# │ 2. VerifyCertificate       │ 50 TPS   │ 30 s  │ Org1 User1 │ Yes (read)│
# │ 3. QueryAllCertificates    │ 20 TPS   │ 30 s  │ Org1 User1 │ Yes (read)│
# │ 4. RevokeCertificate       │ 50 TPS   │ 30 s  │ Org2 User1 │ No (write)│
# └────────────────────────────┴──────────┴───────┴────────────┴───────────┘
# =============================================================================

test:
  name: certificate-benchmark-test
  description: >
    Blockchain Certificate Management System (BCMS) — Full Benchmark v3.0.
    Tests all four RBAC-controlled chaincode functions:
    IssueCertificate (Org1), VerifyCertificate (public),
    QueryAllCertificates (public), RevokeCertificate (Org2).
    Target: Fail = 0 across all rounds.

  workers:
    type: local
    number: 4         # 4 concurrent workers for realistic load simulation

  rounds:

    # =========================================================================
    # Round 1: IssueCertificate
    # =========================================================================
    # Go signature: IssueCertificate(ctx, id, studentName, degree, issuer, issueDate, certHash) error
    # RBAC        : Org1MSP only (enforced inside chaincode via GetMSPID())
    # Fail-Safe   : Idempotent — duplicate CertID returns nil → Fail = 0
    # Workload    : workload/issueCertificate.js generates unique IDs per (worker, tick)
    # =========================================================================
    - label: IssueCertificate
      description: "Org1 issues certificates to the ledger (RBAC: Org1MSP only)"
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50         # 50 TPS × 30 s × 4 workers ≈ 1500 successful txns
      workload:
        module: workload/issueCertificate.js
      txOptions:
        invokerMspId: Org1MSP
        invokerIdentity: User1@org1.example.com

    # =========================================================================
    # Round 2: VerifyCertificate
    # =========================================================================
    # Go signature: VerifyCertificate(ctx, id, certHash) (bool, error)
    # RBAC        : Public — any organisation
    # Fail-Safe   : Returns (false, nil) for unknown certs — never an error
    # Workload    : workload/verifyCertificate.js — readOnly peer query
    # =========================================================================
    - label: VerifyCertificate
      description: "Verify certificate authenticity and integrity (readOnly query)"
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50         # 50 TPS × 30 s × 4 workers ≈ 1500 successful txns
      workload:
        module: workload/verifyCertificate.js
      txOptions:
        invokerMspId: Org1MSP
        invokerIdentity: User1@org1.example.com

    # =========================================================================
    # Round 3: QueryAllCertificates
    # =========================================================================
    # Go signature: QueryAllCertificates(ctx) ([]*Certificate, error)
    # RBAC        : Public — any organisation
    # Fail-Safe   : Returns empty slice on empty ledger — never an error
    # Rate        : Reduced to 20 TPS to avoid memory pressure from full-ledger
    #               scans during high-concurrency testing
    # Workload    : workload/queryAllCertificates.js — no arguments needed
    # =========================================================================
    - label: QueryAllCertificates
      description: "Query all certificates from the ledger (readOnly full scan)"
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 20         # 20 TPS × 30 s × 4 workers ≈ 600 successful txns
      workload:
        module: workload/queryAllCertificates.js
      txOptions:
        invokerMspId: Org1MSP
        invokerIdentity: User1@org1.example.com

    # =========================================================================
    # Round 4: RevokeCertificate
    # =========================================================================
    # Go signature: RevokeCertificate(ctx, id) error
    # RBAC        : Org2MSP authorized  (policy: OR('Org1MSP.peer','Org2MSP.peer'))
    # Fail-Safe   : Idempotent — returns nil when cert not found or already revoked
    # Workload    : workload/revokeCertificate.js — targets same CertIDs as round 1
    # =========================================================================
    - label: RevokeCertificate
      description: "Org2 revokes certificates (RBAC: Org2MSP authorized)"
      txDuration: 30
      rateControl:
        type: fixed-rate
        opts:
          tps: 50         # 50 TPS × 30 s × 4 workers ≈ 1500 successful txns
      workload:
        module: workload/revokeCertificate.js
      txOptions:
        invokerMspId: Org2MSP
        invokerIdentity: User1@org2.example.com
      postIterationWaitTime: 5000   # 5-second cooldown before Caliper teardown
