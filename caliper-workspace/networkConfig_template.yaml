# =============================================================================
# networkConfig.yaml — Caliper Network Configuration v3.0
# =============================================================================
# Blockchain   : Hyperledger Fabric 2.5
# Channel      : mychannel
# Chaincode    : basic  (asset-transfer-basic — RBAC Certificate System)
# Organisations: Org1MSP (IssueCertificate) + Org2MSP (RevokeCertificate)
#
# KEY FIX: discover: false
#   Setting discover: true causes "RoundRobinQueryHandler" errors because
#   Caliper tries to use Service Discovery which is not always available in
#   test-network setups. Setting discover: false forces static peer targeting
#   and eliminates all discovery-related failures.
# =============================================================================

name: fabric-certificate-bcms
version: "2.0.0"

caliper:
  blockchain: fabric

# ---------------------------------------------------------------------------
# Channel + Chaincode binding
# ---------------------------------------------------------------------------
channels:
  - channelName: mychannel
    contracts:
      - id: basic            # Must match the chaincode name used in deployCC

# ---------------------------------------------------------------------------
# Organisations & Identities
# ---------------------------------------------------------------------------
# Org1MSP  — invokes IssueCertificate (RBAC: Org1 only)
# Org2MSP  — invokes RevokeCertificate (RBAC: Org2 authorised)
# ---------------------------------------------------------------------------
organizations:
  # ── Org1 ──────────────────────────────────────────────────────────────────
  - mspid: Org1MSP
    identities:
      certificates:
        - name: 'User1'
          clientPrivateKey:
            # Dynamic path — resolved by fix_and_run_caliper.sh at runtime
            path: 'REPLACE_ORG1_KEY'
          clientSignedCert:
            path: 'REPLACE_ORG1_CERT'
    connectionProfile:
      path: 'networks/connection-org1.yaml'
      discover: false    # ← CRITICAL: prevents RoundRobinQueryHandler errors

  # ── Org2 ──────────────────────────────────────────────────────────────────
  - mspid: Org2MSP
    identities:
      certificates:
        - name: 'User1'
          clientPrivateKey:
            path: 'REPLACE_ORG2_KEY'
          clientSignedCert:
            path: 'REPLACE_ORG2_CERT'
    connectionProfile:
      path: 'networks/connection-org2.yaml'
      discover: false    # ← CRITICAL: prevents RoundRobinQueryHandler errors
