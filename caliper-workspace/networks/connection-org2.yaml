name: connection-org2
version: "1.0"
client:
  organization: Org2
  connection:
    timeout:
      peer:
        endorser: "300"

organizations:
  Org2:
    mspid: Org2MSP
    peers:
      - peer0.org2.example.com
    certificateAuthorities:
      - ca.org2.example.com

peers:
  peer0.org2.example.com:
    url: grpcs://localhost:9051
    tlsCACerts:
      path: DYNAMIC_ORG2_TLS_CERT
    grpcOptions:
      ssl-target-name-override: peer0.org2.example.com
      hostnameOverride: peer0.org2.example.com

certificateAuthorities:
  ca.org2.example.com:
    url: https://localhost:8054
    httpOptions:
      verify: false
    tlsCACerts:
      path: DYNAMIC_CA_ORG2_CERT
    registrar:
      - enrollId: admin
        enrollSecret: adminpw

orderers:
  orderer.example.com:
    url: grpcs://localhost:7050
    tlsCACerts:
      path: DYNAMIC_ORDERER_TLS_CERT
    grpcOptions:
      ssl-target-name-override: orderer.example.com
      hostnameOverride: orderer.example.com

channels:
  mychannel:
    orderers:
      - orderer.example.com
    peers:
      peer0.org2.example.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
    chaincodes:
      - name: basic
        version: "1.0"
