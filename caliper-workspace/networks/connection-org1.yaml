################################################################################
# Connection Profile — Org1
# Fix: grpc.keepalive settings + explicit channel/peer mapping + discover:false
################################################################################

name: "test-network-org1"
version: "1.0.0"

client:
  organization: Org1
  connection:
    timeout:
      peer:
        endorser: "300"
      orderer: "300"

# ─── Channel ──────────────────────────────────────────────────────────────────
channels:
  mychannel:
    orderers:
      - orderer.example.com
    peers:
      peer0.org1.example.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
      peer0.org2.example.com:
        endorsingPeer: true
        chaincodeQuery: false
        ledgerQuery: false
        eventSource: false

# ─── Organizations ────────────────────────────────────────────────────────────
organizations:
  Org1:
    mspid: Org1MSP
    peers:
      - peer0.org1.example.com
    certificateAuthorities:
      - ca.org1.example.com

  Org2:
    mspid: Org2MSP
    peers:
      - peer0.org2.example.com

# ─── Orderers ────────────────────────────────────────────────────────────────
orderers:
  orderer.example.com:
    url: grpcs://localhost:7050
    grpcOptions:
      ssl-target-name-override: orderer.example.com
      hostnameOverride: orderer.example.com
      grpc.keepalive_time_ms: 600000
      grpc.keepalive_timeout_ms: 20000
      grpc.http2.min_time_between_pings_ms: 120000
      grpc.http2.max_pings_without_data: 0
    tlsCACerts:
      path: "REPLACE_ROOT/test-network/organizations/ordererOrganizations/example.com/orderers/orderer.example.com/msp/tlscacerts/tlsca.example.com-cert.pem"

# ─── Peers ────────────────────────────────────────────────────────────────────
peers:
  peer0.org1.example.com:
    url: grpcs://localhost:7051
    grpcOptions:
      ssl-target-name-override: peer0.org1.example.com
      hostnameOverride: peer0.org1.example.com
      grpc.keepalive_time_ms: 600000
      grpc.keepalive_timeout_ms: 20000
    tlsCACerts:
      path: "REPLACE_ROOT/test-network/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/ca.crt"

  peer0.org2.example.com:
    url: grpcs://localhost:9051
    grpcOptions:
      ssl-target-name-override: peer0.org2.example.com
      hostnameOverride: peer0.org2.example.com
      grpc.keepalive_time_ms: 600000
      grpc.keepalive_timeout_ms: 20000
    tlsCACerts:
      path: "REPLACE_ROOT/test-network/organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls/ca.crt"

# ─── Certificate Authorities ─────────────────────────────────────────────────
certificateAuthorities:
  ca.org1.example.com:
    url: https://localhost:7054
    caName: ca-org1
    tlsCACerts:
      path: "REPLACE_ROOT/test-network/organizations/peerOrganizations/org1.example.com/ca/ca.org1.example.com-cert.pem"
    httpOptions:
      verify: false
